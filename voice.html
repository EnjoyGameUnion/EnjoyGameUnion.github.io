    <style>
      /* ボイスボタン固有スタイル */
      .v-btn {
        position: relative;
        overflow: hidden;
        transition: all 0.25s cubic-bezier(0.165, 0.84, 0.44, 1);
      }
      .v-btn::after {
        content: '';
        position: absolute;
        left: 0; top: 0; bottom: 0;
        width: 3px;
        background: linear-gradient(to bottom, #6366f1, #ec4899);
        transform: scaleY(0);
        transform-origin: bottom;
        transition: transform 0.25s ease;
        border-radius: 0 2px 2px 0;
      }
      .v-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 25px -5px rgba(99,102,241,0.2);
        border-color: #c7d2fe !important;
      }
      .v-btn:hover::after { transform: scaleY(1); }
      .v-btn:active { transform: translateY(0); }

      .v-btn.is-playing {
        background: #f5f3ff !important;
        border-color: #a5b4fc !important;
        box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
      }
      .v-btn.is-playing::after { transform: scaleY(1); }

      /* 再生中の波形アニメーション */
      .wave-bar {
        display: inline-block;
        width: 3px;
        background: #6366f1;
        border-radius: 2px;
        animation: waveAnim 0.7s ease-in-out infinite alternate;
      }
      .wave-bar:nth-child(1) { height: 4px;  animation-delay: 0s; }
      .wave-bar:nth-child(2) { height: 14px; animation-delay: 0.1s; }
      .wave-bar:nth-child(3) { height: 8px;  animation-delay: 0.05s; }
      .wave-bar:nth-child(4) { height: 12px; animation-delay: 0.15s; }
      .wave-bar:nth-child(5) { height: 5px;  animation-delay: 0.08s; }
      @keyframes waveAnim {
        from { transform: scaleY(0.3); }
        to   { transform: scaleY(1); }
      }

      /* カテゴリセクション */
      .cat-section { transition: opacity 0.3s ease, transform 0.3s ease; }

    /* ============================================================
       Audio Engine
    ============================================================ */
    let currentAudio = null;
    let currentBtn   = null;
    let masterVolume = 0.8;

    function playBeep(freq = 440, dur = 0.5) {
      try {
        const ctx  = new (window.AudioContext || window.webkitAudioContext)();
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(masterVolume * 0.22, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
        osc.start(); osc.stop(ctx.currentTime + dur);
        return dur * 1000;
      } catch(e) { return 500; }
    }

    function setPlayIcon(btn, playing) {
      const icon = btn.querySelector('.btn-play-icon');
      if (!icon) return;
      icon.className = playing
        ? 'btn-play-icon fa-solid fa-pause text-primary text-xs'
        : 'btn-play-icon fa-solid fa-play text-slate-400 text-xs group-hover:text-primary transition-colors';
    }

    function stopCurrent() {
      if (currentAudio) { currentAudio.pause(); currentAudio = null; }
      if (currentBtn)   { currentBtn.classList.remove('is-playing'); setPlayIcon(currentBtn, false); currentBtn = null; }
      document.getElementById('now-playing-text').textContent = '—';
      document.getElementById('music-icon').className = 'fa-solid fa-music text-primary';
    }

    function playVoice(btn, src, label) {
      if (currentBtn === btn) { stopCurrent(); return; }
      stopCurrent();

      document.getElementById('now-playing-text').textContent = label;
      document.getElementById('music-icon').className = 'fa-solid fa-music text-primary fa-beat';
      btn.classList.add('is-playing');
      setPlayIcon(btn, true);
      currentBtn = btn;

      if (!src) {
        const freqs = [262,294,330,349,392,440,494,523,587,659];
        const ms = playBeep(freqs[label.length % freqs.length], 0.55);
        setTimeout(() => { if (currentBtn === btn) stopCurrent(); }, ms);
        return;
      }
      const audio = new Audio(src);
      audio.volume = masterVolume;
      audio.play().catch(() => {});
      audio.addEventListener('ended', () => { if (currentBtn === btn) stopCurrent(); });
      audio.addEventListener('error', () => { if (currentBtn === btn) stopCurrent(); });
      currentAudio = audio;
    }


    /* ============================================================
       Build UI
    ============================================================ */
    function buildFilterTabs() {
      const wrap = document.querySelector('.filter-scroll');
      VOICE_CATEGORIES.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'filter-tab shrink-0 px-4 py-2 rounded-full text-xs font-black font-en tracking-wider border border-slate-200 text-slate-500 hover:border-primary hover:text-primary transition-all';
        btn.dataset.filter = cat.id;
        btn.textContent = cat.en;
        wrap.appendChild(btn);
      });
    }

    function buildVoiceMain() {
      const main = document.getElementById('voice-main');
      main.innerHTML = '';

      VOICE_CATEGORIES.forEach((cat, idx) => {
        const sec = document.createElement('section');
        sec.className = 'cat-section mb-16 fade-in-up';
        sec.id = `cat-${cat.id}`;
        sec.style.transitionDelay = `${idx * 0.04}s`;

        // セクションヘッダー
        sec.innerHTML = `
          <div class="flex items-center gap-4 mb-6">
            <div class="w-10 h-10 rounded-2xl bg-primary/10 flex items-center justify-center shrink-0">
              <i class="${cat.icon} text-primary text-sm"></i>
            </div>
            <div class="flex items-baseline gap-3">
              <h2 class="text-2xl font-black font-en text-dark tracking-tight">${cat.en}</h2>
              <span class="text-sm text-slate-400 font-medium">${cat.jp}</span>
              <span class="text-[10px] font-black font-en tracking-widest text-slate-400 border border-slate-200 rounded-full px-2.5 py-0.5">${cat.voices.length}</span>
            </div>
            <div class="flex-1 h-px bg-slate-100 ml-2"></div>
          </div>
          <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-2.5" id="grid-${cat.id}"></div>
        `;
        main.appendChild(sec);

        const grid = sec.querySelector(`#grid-${cat.id}`);
        cat.voices.forEach(v => {
          const btn = document.createElement('button');
          btn.className = 'v-btn group w-full bg-white rounded-2xl border border-slate-100 p-3.5 text-left flex items-center gap-3 shadow-sm';
          btn.dataset.label = v.label;
          btn.dataset.cat   = cat.id;
          btn.innerHTML = `
            <div class="w-8 h-8 rounded-xl bg-slate-50 group-hover:bg-primary/10 flex items-center justify-center shrink-0 transition-colors">
              <i class="btn-play-icon fa-solid fa-play text-slate-400 text-xs group-hover:text-primary transition-colors"></i>
            </div>
            <div class="flex-1 min-w-0">
              <span class="text-xs font-bold text-slate-700 leading-snug line-clamp-2">${v.label}</span>
            </div>
            <div class="wave-wrap flex items-end gap-0.5 h-4 shrink-0 opacity-0 transition-opacity ${'' /* is-playing で opacity-100 */}">
              <span class="wave-bar"></span>
              <span class="wave-bar"></span>
              <span class="wave-bar"></span>
              <span class="wave-bar"></span>
              <span class="wave-bar"></span>
            </div>
          `;
          // is-playing で wave 表示
          const waveWrap = btn.querySelector('.wave-wrap');
          const mo = new MutationObserver(() => {
            waveWrap.classList.toggle('opacity-100', btn.classList.contains('is-playing'));
            waveWrap.classList.toggle('opacity-0',  !btn.classList.contains('is-playing'));
          });
          mo.observe(btn, { attributes: true, attributeFilter: ['class'] });

          btn.addEventListener('click', () => playVoice(btn, v.src, v.label));
          grid.appendChild(btn);
        });
      });

      // fade-in-up を IntersectionObserver で発火
      document.querySelectorAll('.fade-in-up').forEach(el => observer.observe(el));
    }


    /* ============================================================
       Filter / Search
    ============================================================ */
    function applyFilter(filterId, query = '') {
      const q = query.trim().toLowerCase();
      const main = document.getElementById('voice-main');

      const old = document.getElementById('empty-state');
      if (old) old.remove();

      let anyVisible = false;

      VOICE_CATEGORIES.forEach(cat => {
        const sec  = document.getElementById(`cat-${cat.id}`);
        if (!sec) return;
        const grid = document.getElementById(`grid-${cat.id}`);
        const catMatch = filterId === 'all' || filterId === cat.id;
        let visible = 0;

        grid.querySelectorAll('.v-btn').forEach(btn => {
          const match = catMatch && (!q || btn.dataset.label.toLowerCase().includes(q));
          btn.classList.toggle('is-hidden', !match);
          if (match) visible++;
        });

        sec.classList.toggle('is-hidden', visible === 0);
        if (visible > 0) anyVisible = true;
      });

      if (!anyVisible) {
        const div = document.createElement('div');
        div.id = 'empty-state';
        div.className = 'text-center py-24 text-slate-400';
        div.innerHTML = `
          <i class="fa-solid fa-magnifying-glass text-4xl mb-4 block opacity-30"></i>
          <p class="font-bold">「${query}」に一致するボタンが見つかりませんでした。</p>
        `;
        main.appendChild(div);
      }
    }


    /* ============================================================
       Event Listeners
    ============================================================ */
    document.getElementById('volume-slider').addEventListener('input', e => {
      masterVolume = e.target.value / 100;
      if (currentAudio) currentAudio.volume = masterVolume;
    });

    document.getElementById('search-input').addEventListener('input', e => {
      const active = document.querySelector('.filter-tab.active-tab');
      applyFilter(active ? active.dataset.filter : 'all', e.target.value);
    });

    document.querySelector('.filter-scroll').addEventListener('click', e => {
      const tab = e.target.closest('.filter-tab');
      if (!tab) return;

      // スタイル切り替え
      document.querySelectorAll('.filter-tab').forEach(t => {
        t.classList.remove('active-tab', 'bg-slate-900', 'text-white', 'border-slate-900', 'shadow-md');
        t.classList.add('border-slate-200', 'text-slate-500');
      });
      tab.classList.add('active-tab', 'bg-slate-900', 'text-white', 'border-slate-900', 'shadow-md');
      tab.classList.remove('border-slate-200', 'text-slate-500');

      const q = document.getElementById('search-input').value;
      applyFilter(tab.dataset.filter, q);

      if (tab.dataset.filter !== 'all') {
        const target = document.getElementById(`cat-${tab.dataset.filter}`);
        if (target) {
          const offset = 160; // ヘッダー＋コントロールバー分
          window.scrollTo({ top: target.offsetTop - offset, behavior: 'smooth' });
        }
      }
    });

    /* ヘッダースクロール制御 (common.js と同じ) */
    window.addEventListener('scroll', () => {
      const header = document.getElementById('header');
      if (window.scrollY > 50) {
        header.classList.add('shadow-md');
        header.classList.replace('bg-white/80', 'bg-white/95');
      } else {
        header.classList.remove('shadow-md');
        header.classList.replace('bg-white/95', 'bg-white/80');
      }
    });

    /* ハンバーガーメニュー (common.js と同じ) */
    const sideMenu = document.getElementById('side-menu');
    const overlay  = document.getElementById('menu-overlay');
    function toggleMenu(isOpen) {
      sideMenu.classList.toggle('active', isOpen);
      overlay.classList.toggle('active', isOpen);
      document.body.style.overflow = isOpen ? 'hidden' : '';
    }
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('menu-open-btn').addEventListener('click', () => toggleMenu(true));
      document.getElementById('menu-close-btn').addEventListener('click', () => toggleMenu(false));
      overlay.addEventListener('click', () => toggleMenu(false));
      document.querySelectorAll('.nav-link').forEach(l => l.addEventListener('click', () => toggleMenu(false)));
    });

    /* スクロールアニメーション (common.js と同じ) */
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('is-visible');
      });
    }, { threshold: 0.1 });


    /* ============================================================
       Init
    ============================================================ */
    buildFilterTabs();
    buildVoiceMain();
    </script>
  </body>
</html>
